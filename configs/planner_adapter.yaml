train:
  diagnosis_adapter: false
  planner_adapter: true

model:
  model_name: "Qwen/Qwen2.5-3B-Instruct"
  quant_4bit: false
  use_lora: true
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.1
  lora_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  name: "mimic_cdm"
  builder: "mimic_cdm"
  root_dir: "dataset"
  train_file: "train.csv"
  val_file: "val.csv"
  test_file: "test.csv"
  lab_test_mapping_file: "lab_test_mapping.csv"
  diagnosis_prompt_file: "prompts/diagnosis_adapter.txt"
  max_state_chars: 12000

training:
  run_root: "/media/NAS/nas_175/seojun/LatentCDM/runs"
  experiment_name: "planner_adapter"
  output_dir: ""
  timestamp_output_dir: true
  seed: 269
  bf16: true
  report_to: "none"
  num_train_epochs: 4
  learning_rate: 1.0e-5
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  gradient_checkpointing: false
  logging_steps: 5
  save_steps: 100
  min_visible_tests: 1
  max_visible_tests: 12
  states_per_patient: 4
  use_all_available_tests: false
  max_prompt_length: 4096
  max_completion_length: 32

planner:
  diagnosis_adapter_dir: "/media/NAS/nas_175/seojun/LatentCDM/runs/diagnosis_adapter/mimic_cdm/2026-07-11/16-24-32/final"
  memory_tokens_per_layer: 1
  num_belief_tokens: 1
  bridge_hidden_dim: 2048
  candidate_diseases:
    - appendicitis
    - cholecystitis
    - diverticulitis
    - pancreatitis
  action_prefix: "Action:"
